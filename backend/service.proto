syntax = "proto3";

package auth;

// Authentication service definition
service AuthService {
  // Login with username and password
  rpc Login(LoginRequest) returns (LoginResponse);
  
  // Validate a session token
  rpc ValidateSession(ValidateSessionRequest) returns (ValidateSessionResponse);
  
  // Logout (invalidate session)
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  
  // Health check - returns if server is alive and config timestamp
  rpc IsAlive(IsAliveRequest) returns (IsAliveResponse);
  
  // Get process PID
  rpc GetPID(GetPIDRequest) returns (GetPIDResponse);
  
  // List all users (for management UI)
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  
  // Add a new user
  rpc AddUser(AddUserRequest) returns (AddUserResponse);
  
  // Delete a user
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // Update user permission assignments
  rpc UpdateUserPermissions(UpdateUserPermissionsRequest) returns (UpdateUserPermissionsResponse);

  // Permission metadata
  rpc GetPermissionData(GetPermissionDataRequest) returns (GetPermissionDataResponse);

  // Declare custom service permission
  rpc DeclareServicePermission(DeclareServicePermissionRequest) returns (DeclareServicePermissionResponse);

  // Check one user's permission
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  
  // Issue a new JWT token for a user
  rpc IssueToken(IssueTokenRequest) returns (IssueTokenResponse);
  
  // Get JWT token information by JTI
  rpc GetTokenInfo(GetTokenInfoRequest) returns (GetTokenInfoResponse);

  // Delete JWT token by JTI
  rpc DeleteToken(DeleteTokenRequest) returns (DeleteTokenResponse);

  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  rpc CleanupTokens(CleanupTokensRequest) returns (CleanupTokensResponse);

  rpc IssueTempToken(IssueTempTokenRequest) returns (IssueTempTokenResponse);

  rpc GetJwks(GetJwksRequest) returns (GetJwksResponse);
  
  // Database management
  rpc GetDatabaseList(GetDatabaseListRequest) returns (GetDatabaseListResponse);
  rpc AddDatabase(AddDatabaseRequest) returns (AddDatabaseResponse);
  rpc RemoveDatabase(RemoveDatabaseRequest) returns (RemoveDatabaseResponse);
  rpc UpdateDatabase(UpdateDatabaseRequest) returns (UpdateDatabaseResponse);
  rpc ChangeCurrentDatabase(ChangeCurrentDatabaseRequest) returns (ChangeCurrentDatabaseResponse);
}

// Login request message
message LoginRequest {
  string username = 1;
  string password = 2;
}

// Login response message
message LoginResponse {
  bool success = 1;
  string message = 2;
  string session_token = 3;  // JWT or session ID
  int64 expires_at = 4;       // Unix timestamp
}

// Validate session request
message ValidateSessionRequest {
  string session_token = 1;
}

// Validate session response
message ValidateSessionResponse {
  bool valid = 1;
  string username = 2;
  string message = 3;
}

// Logout request
message LogoutRequest {
  string session_token = 1;
}

// Logout response
message LogoutResponse {
  bool success = 1;
  string message = 2;
}

// IsAlive request (empty)
message IsAliveRequest {
}

// IsAlive response
message IsAliveResponse {
  bool alive = 1;
  int64 unix_stamp_ms = 2;
}

// GetPID request (empty)
message GetPIDRequest {
}

// GetPID response
message GetPIDResponse {
  int32 pid = 1;
}

// ListUsers request (empty)
message ListUsersRequest {
}

// User info for listing
message UserInfo {
  int32 uid = 1;
  string username = 2;
  string password_hash = 3;
  repeated string jwt_token_ids = 4;  // List of JTI (JWT Token IDs)
  repeated int32 permission_codes = 5;
  repeated ServicePermissionAssignment service_permissions = 6;
}

// ListUsers response
message ListUsersResponse {
  repeated UserInfo users = 1;
}

// AddUser request
message AddUserRequest {
  string username = 1;
  string password = 2;
  repeated int32 permission_codes = 3;
  repeated ServicePermissionAssignment service_permissions = 4;
}

// AddUser response
message AddUserResponse {
  bool success = 1;
  string message = 2;
  int32 uid = 3;  // UID of created user (if successful)
}

// DeleteUser request
message DeleteUserRequest {
  int32 uid = 1;
}

// DeleteUser response
message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message PermissionMetaInfo {
  int32 permission_code = 1;
  string display_name = 2;
  string description = 3;
}

message PermissionIncludeInfo {
  int32 permission_code = 1;
  int32 permission_code_included = 2;
}

message ServicePermissionMetaInfo {
  string service_id = 1;
  int32 permission_code = 2;
  string display_name = 3;
  string description = 4;
}

message ServicePermissionIncludeInfo {
  string service_id = 1;
  int32 permission_code = 2;
  int32 permission_code_included = 3;
}

message ServicePermissionAssignment {
  string service_id = 1;
  int32 permission_code = 2;
}

message UpdateUserPermissionsRequest {
  int32 uid = 1;
  repeated int32 permission_codes = 2;
  repeated ServicePermissionAssignment service_permissions = 3;
}

message UpdateUserPermissionsResponse {
  bool success = 1;
  string message = 2;
}

message GetPermissionDataRequest {}

message GetPermissionDataResponse {
  bool success = 1;
  string message = 2;
  repeated PermissionMetaInfo permissions = 3;
  repeated PermissionIncludeInfo permission_includes = 4;
  repeated ServicePermissionMetaInfo service_permissions = 5;
  repeated ServicePermissionIncludeInfo service_permission_includes = 6;
}

message DeclareServicePermissionRequest {
  string service_id = 1;
  int32 permission_code = 2;
  string display_name = 3;
  string description = 4;
  repeated int32 permission_codes_included = 5;
}

message DeclareServicePermissionResponse {
  bool success = 1;
  string message = 2;
}

message CheckPermissionRequest {
  int32 uid = 1;
  int32 permission_code = 2;
  string service_id = 3;
}

message CheckPermissionResponse {
  bool success = 1;
  string message = 2;
  bool permitted = 3;
}

// IssueToken request
message IssueTokenRequest {
  int32 uid = 1;
}

// IssueToken response
message IssueTokenResponse {
  bool success = 1;
  string message = 2;
  string jti = 3;        // JWT Token ID
  string token = 4;      // The actual JWT token
}

// GetTokenInfo request
message GetTokenInfoRequest {
  string jti = 1;
}

// GetTokenInfo response
message GetTokenInfoResponse {
  bool success = 1;
  string message = 2;
  string jti = 3;
  int32 uid = 4;
  string token = 5;
  int64 created_at = 6;
  int64 expires_at = 7;
  int32 status_code = 8;
  int64 revoked_at = 9;
  int32 created_at_timezone = 10;
}

message DeleteTokenRequest {
  string jti = 1;
}

message DeleteTokenResponse {
  bool success = 1;
  string message = 2;
}

message RevokeTokenRequest {
  string jti = 1;
}

message RevokeTokenResponse {
  bool success = 1;
  string message = 2;
}

message CleanupTokensRequest {}

message CleanupTokensResponse {
  bool success = 1;
  string message = 2;
  int32 expired_count = 3;
  int32 retained_count = 4;
  int32 deleted_count = 5;
}

message IssueTempTokenRequest {
  string token = 1;
}

message IssueTempTokenResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  int64 expires_at = 4;
}

message GetJwksRequest {}

message GetJwksResponse {
  bool success = 1;
  string message = 2;
  string jwks_json = 3;
}

// Database management messages
message DatabaseInfo {
  int32 id = 1;
  string name = 2;
  string type = 3;
  string host = 4;
  int32 port = 5;
  string database = 6;
  string username = 7;
  string password = 8;
  string path = 9;
  bool is_default = 10;
  bool is_removable = 11;
}

message GetDatabaseListRequest {}

message GetDatabaseListResponse {
  bool success = 1;
  string message = 2;
  repeated DatabaseInfo databases = 3;
  int32 current_database_id = 4;
}

message AddDatabaseRequest {
  string name = 1;
  string type = 2;
  string host = 3;
  int32 port = 4;
  string database = 5;
  string username = 6;
  string password = 7;
  string path = 8;
}

message AddDatabaseResponse {
  bool success = 1;
  string message = 2;
  DatabaseInfo database = 3;
}

message RemoveDatabaseRequest {
  int32 db_id = 1;
}

message RemoveDatabaseResponse {
  bool success = 1;
  string message = 2;
}

message UpdateDatabaseRequest {
  int32 db_id = 1;
  string name = 2;
  string host = 3;
  int32 port = 4;
  string database = 5;
  string username = 6;
  string password = 7;
  string path = 8;
}

message UpdateDatabaseResponse {
  bool success = 1;
  string message = 2;
  DatabaseInfo database = 3;
}

message ChangeCurrentDatabaseRequest {
  int32 db_id = 1;
}

message ChangeCurrentDatabaseResponse {
  bool success = 1;
  string message = 2;
}

